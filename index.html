<!doctype html>
<html lang="zh-CN" data-loading="true">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SizeKit 是一个面向设计师的尺寸画板工具，用平台图标快速查看新媒体和印刷物料尺寸。" />
  <title>SizeKit - 设计尺寸画板</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app" aria-label="SizeKit 设计尺寸画板">
    <section class="workspace" aria-label="尺寸画布">
      <header class="workspace-topbar">
        <div class="header-platforms" aria-label="选择平台或物料">
          <div class="platform-fixed platform-all-slot" id="platformAllSlot"></div>
          <div class="header-marquee" id="platformCenter" aria-label="选择平台或物料">
            <nav class="platform-nav" id="platformNav" aria-label="选择平台或物料"></nav>
          </div>
          <div class="platform-hover-title" id="platformHoverTitle" aria-hidden="true"></div>
        </div>
      </header>

      <section class="toolbar" aria-label="搜索和尺寸过滤器">
        <div class="platform-select" id="platformSelect">
          <button class="platform-select-trigger" id="platformSelectSummary" type="button"></button>
          <div class="platform-select-panel" id="platformSelectPanel"></div>
        </div>
        <label class="search-box" aria-label="搜索尺寸">
          <span>⌕</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="搜索尺寸" />
        </label>
        <div class="filter-strip" id="filterStrip" aria-label="尺寸过滤器"></div>
        <div class="header-actions">
          <input class="image-file-input" id="imageFileInput" type="file" accept="image/*" multiple />
          <button class="image-action" id="imageFileButton" type="button" aria-label="选择本地图片">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 5h14v14H5V5Zm2 2v8.4l3-3 2.4 2.2 2.5-3.1L17 14.2V7H7Zm10 9.7-2.1-2.7-2.3 2.8-2.5-2.3L7.7 17H17v-.3ZM9.4 8.5a1.3 1.3 0 1 1 0 2.6 1.3 1.3 0 0 1 0-2.6Z"/>
            </svg>
          </button>
          <button class="theme-action" id="themeToggle" type="button" aria-label="切换背景">◐</button>
          <button class="language-action" id="languageToggle" type="button" aria-label="切换语言">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 5h9v2H9.8a13.7 13.7 0 0 1-1.6 3.8c.8.7 1.6 1.3 2.5 1.8l-1 1.7a13.2 13.2 0 0 1-2.6-2 12.4 12.4 0 0 1-3 2.3L3 12.9a10.4 10.4 0 0 0 2.9-2.1A12.4 12.4 0 0 1 4.4 8l1.7-.7c.3.8.7 1.5 1.1 2.1.4-.7.8-1.5 1-2.4H4V5Zm13.3 3h1.9l3.1 9h-2l-.6-1.8h-3l-.6 1.8h-2l3.2-9Zm-.1 5.5h1.9l-.9-2.9-1 2.9ZM12 17h11v2H12v-2Z"/>
            </svg>
          </button>
        </div>
      </section>

      <section class="canvas" id="canvas" aria-live="polite">
        <div class="artboard-grid" id="artboardGrid"></div>
      </section>
    </section>
  </main>

  <dialog class="detail-dialog" id="detailDialog">
    <article class="detail-card">
      <button class="close-button" id="closeDialog" type="button" aria-label="关闭">×</button>
      <div class="detail-head">
        <div class="detail-logo" id="detailLogo">S</div>
        <div>
          <p id="detailPlatform">SizeKit</p>
          <h2 id="detailTitle">尺寸详情</h2>
          <span id="detailTags"></span>
        </div>
      </div>

      <div class="detail-layout">
        <div class="detail-preview-wrap">
          <div class="detail-preview" id="detailPreview"><span id="detailRatioText">1:1</span></div>
        </div>
        <dl class="specs">
          <div><dt data-i18n="size">尺寸</dt><dd id="detailSize"></dd></div>
          <div><dt data-i18n="ratio">比例</dt><dd id="detailRatio"></dd></div>
          <div><dt data-i18n="unit">单位</dt><dd id="detailUnit"></dd></div>
          <div><dt data-i18n="type">类型</dt><dd id="detailCategory"></dd></div>
          <div><dt>DPI</dt><dd id="detailDpi"></dd></div>
          <div><dt data-i18n="safeArea">安全区 / 出血</dt><dd id="detailBleed"></dd></div>
        </dl>
      </div>

      <p class="note" id="detailNote"></p>

      <section class="dpi-panel" id="dpiPanel" hidden>
        <div class="dpi-title">
          <strong data-i18n="dpiConvert">DPI 像素换算</strong>
          <span data-i18n="dpiNote">按成品尺寸估算，印刷以前以印厂文件为准。</span>
        </div>
        <div class="dpi-grid" id="dpiGrid"></div>
      </section>

      <div class="dialog-actions">
        <button class="primary-button" id="copySizeButton" type="button">复制尺寸</button>
        <button class="secondary-button" id="copyRatioButton" type="button">复制比例</button>
      </div>
    </article>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
